<div class="login-page">
  <div class="login-card">
    <h1>Sign In</h1>
    <p class="subtitle">Access the workflow management system.</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          [(ngModel)]="formData.email"
          required
          placeholder="Enter your email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="formData.password"
          required
          placeholder="Enter your password"
        />
      </div>

      <button class="primary-btn" type="submit" [disabled]="loading || !loginForm.form.valid">
        {{ loading ? 'Signing In...' : 'Sign In' }}
      </button>

      <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>
    </form>

    <div class="demo-users">
      <p><strong>Demo users</strong></p>
      <p>employee&#64;workflow.com / employee123</p>
      <p>manager&#64;workflow.com / manager123</p>
      <p>admin&#64;workflow.com / admin123</p>
    </div>
  </div>
</div>
