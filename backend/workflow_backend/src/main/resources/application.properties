spring.application.name=workflow_backend

server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/workflow_db}
spring.datasource.username=${DB_USERNAME:workflow_user}
spring.datasource.password=${DB_PASSWORD:workflow_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=${JWT_SECRET:yourVeryLongAndSecureJwtSecretKeyThatIsAtLeast32Characters}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}