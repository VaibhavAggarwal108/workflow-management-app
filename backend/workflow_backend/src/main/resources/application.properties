spring.application.name=workflow-backend

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/workflow_db
spring.datasource.username=workflow_user
spring.datasource.password=workflow_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=DEBUG

app.jwt.secret=yourVeryLongAndSecureJwtSecretKeyThatIsAtLeast32Characters
app.jwt.expiration=86400000